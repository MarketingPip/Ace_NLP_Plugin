<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>#editor { height: 400px; width: 100%; border: 1px solid #ccc; }</style>
</head>
<body>

<div id="editor">John Doe visited Paris in 2024. 
He spent $50.00 at Apple. 
The phone number is 555-1234.</div>

<script type="module">
import ace from 'https://esm.sh/ace-builds';
import nlp from 'https://esm.sh/compromise';

const { Mode: TextMode } = ace.require("ace/mode/text");
const { TextHighlightRules } = ace.require("ace/mode/text_highlight_rules");

// 1. Map your custom names to Ace's built-in theme classes (Tokens)
const tokenMap = {
  "date": "constant.library",         // Blue/Teal
  "person": "keyword",                // Pink
  "place": "string",                  // Yellow
  "organization": "support.function", // Purple
  "url": "markup.underline",          // Underlined
  "phone": "constant.numeric",        // Purple/Orange
  "currency": "constant.numeric",     // Purple/Orange
  "value": "variable"                 // Light Blue
};

// Your specific pattern object
const patterns = {
  "#Date+": "date",
 // "jared man": "person",
  "#Person+": "place",
  "#Place+": "place",
  "#Organization+": "organization",
  "#Url+": "url",
  "#PhoneNumber+": "phone",
  "#AtMention+": "atMention",
  "#Email+": "email",
  "#Currency+": "currency",
  "#Value+": "value",
};

const escapeRegex = (str) => str.replace(/[.*+?^${}()|[\]\ factory\\]/g, '\\$&');

// 2. The Logic: Convert the "patterns" keys into actual found words
const getDynamicRules = (text) => {
  const doc = nlp(text);
  const activeRules = [];

  Object.keys(patterns).forEach(key => {
    const match = doc.match(key);
    if (match.found) {
      // Get unique text strings found for this pattern
      const foundWords = match.out('array');
      foundWords.forEach(word => {
        if(word.includes("$")){
          word = escapeRegex(word)
        }
        activeRules.push({
          token: tokenMap[patterns[key]] || "text",
          regex: word
        });
      });
    }
  });

  return activeRules;
};

// 3. The Dynamic Rule Engine
class NlpHighlightRules extends TextHighlightRules {
  constructor(dynamicRules) {
    super();
    this.$rules = {
      "start": [
        ...dynamicRules,
        { defaultToken: "text" }
      ]
    };
  }
}

class NlpMode extends TextMode {
  constructor(dynamicRules) {
    super();
    this.HighlightRules = function() {
      return new NlpHighlightRules(dynamicRules);
    };
  }
}

// 4. Setup Editor
const editor = ace.edit("editor");
editor.setTheme("ace/theme/monokai");

const runNlpUpdate = () => {
  const text = editor.getValue();
  const dynamicRules = getDynamicRules(text);
  
  // Update the syntax engine with the newly found tokens
  editor.session.setMode(new NlpMode(dynamicRules));
};

// Trigger update on change (with debounce)
let typingTimer;
editor.on("change", () => {
   runNlpUpdate()
});

// Initial run
runNlpUpdate();
</script>
</body>
</html>
